services:
  - type: web
    name: vaptai-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: 3.13.12
